# Production Nginx config — routes /api/* to Laravel PHP-FPM, /* to React SPA.
# Included inside the nginx http { } block via conf.d/.

# Rate limiting zones — defined at http level (conf.d files are inside http {})
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_login:1m     rate=5r/m;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip for API JSON + JS assets
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
    gzip_vary       on;

    # ── Health endpoint — no rate limit, no access log (used by load balancers) ──
    location = /api/v1/health {
        access_log off;
        fastcgi_pass            api:9000;
        fastcgi_param           SCRIPT_FILENAME /var/www/api/public/index.php;
        fastcgi_param           SCRIPT_NAME     /index.php;
        include                 fastcgi_params;
    }

    # ── Auth login — strict rate limit (5 req/min per IP) ─────────────────────
    location ~ ^/api/v1/auth/login {
        limit_req               zone=api_login burst=3 nodelay;
        fastcgi_pass            api:9000;
        fastcgi_param           SCRIPT_FILENAME /var/www/api/public/index.php;
        fastcgi_param           SCRIPT_NAME     /index.php;
        include                 fastcgi_params;
        fastcgi_read_timeout    30;
    }

    # ── All other API endpoints ────────────────────────────────────────────────
    location ~ ^/api {
        limit_req               zone=api_general burst=20 nodelay;
        fastcgi_pass            api:9000;
        fastcgi_param           SCRIPT_FILENAME /var/www/api/public/index.php;
        fastcgi_param           SCRIPT_NAME     /index.php;
        include                 fastcgi_params;
        fastcgi_read_timeout    60;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         4 256k;
    }

    # ── React SPA — proxy to frontend container (nginx:alpine) ────────────────
    location / {
        proxy_pass              http://frontend:80;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout      10;
    }

    # Block dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
