name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── PHPUnit ──────────────────────────────────────────────────────────────────
  test-api:
    name: PHPUnit (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ATTENDANCE/attendance-email-system/api
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_sqlite, mbstring, bcmath, pcntl, opcache
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ATTENDANCE/attendance-email-system/api/vendor
          key: composer-${{ hashFiles('ATTENDANCE/attendance-email-system/api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction
          # jwt:secret writes JWT_SECRET into .env for tests
          php artisan jwt:secret --no-interaction

      - name: Run PHPUnit
        run: php artisan test --stop-on-failure

  # ── Frontend build + lint ─────────────────────────────────────────────────────
  test-frontend:
    name: Frontend (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ATTENDANCE/attendance-email-system/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ATTENDANCE/attendance-email-system/frontend/package-lock.json

      - run: npm ci

      # Verify TypeScript compiles and Vite build completes cleanly
      - run: npm run build

      - run: npm run lint

  # ── ML service pytest ─────────────────────────────────────────────────────────
  test-ml:
    name: pytest (FastAPI / ML)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ATTENDANCE/attendance-email-system/ml-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ATTENDANCE/attendance-email-system/ml-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run pytest
        run: |
          if find . -path ./tests -prune -o -name "test_*.py" -print -quit 2>/dev/null | grep -q .; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — add tests to ml-service/tests/ to enable this step."
          fi

  # ── Docker image build verification ──────────────────────────────────────────
  build-images:
    name: Build Docker images
    needs: [test-api, test-frontend, test-ml]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ATTENDANCE/attendance-email-system/api
          file: ATTENDANCE/attendance-email-system/infrastructure/docker/api.Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ATTENDANCE/attendance-email-system/api
          file: ATTENDANCE/attendance-email-system/infrastructure/docker/worker.Dockerfile
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build ML service image
        uses: docker/build-push-action@v5
        with:
          context: ATTENDANCE/attendance-email-system/ml-service
          file: ATTENDANCE/attendance-email-system/infrastructure/docker/ml-service.Dockerfile
          push: false
          cache-from: type=gha,scope=ml
          cache-to: type=gha,scope=ml,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ATTENDANCE/attendance-email-system/frontend
          file: ATTENDANCE/attendance-email-system/infrastructure/docker/frontend.Dockerfile
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
